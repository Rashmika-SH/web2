<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="cosmicGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f5ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:0.6" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer cosmic circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#cosmicGlow)" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  
  <!-- Inner circle background -->
  <circle cx="100" cy="100" r="75" fill="rgba(15, 12, 41, 0.9)"/>
  
  <!-- Trishul (Trident) -->
  <g filter="url(#glow)">
    <!-- Central shaft -->
    <line x1="100" y1="60" x2="100" y2="140" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Left prong -->
    <path d="M 85 70 Q 90 65 95 70 L 100 80" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Right prong -->
    <path d="M 115 70 Q 110 65 105 70 L 100 80" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Middle prong tip -->
    <path d="M 95 65 L 100 55 L 105 65" stroke="#FFD700" stroke-width="3" fill="none" stroke-linejoin="round"/>
    
    <!-- Base ornament -->
    <circle cx="100" cy="140" r="5" fill="#FFD700"/>
    <path d="M 95 145 Q 100 150 105 145" stroke="#FFD700" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Crescent moon -->
  <g filter="url(#glow)">
    <path d="M 70 100 Q 65 90 70 80 Q 75 85 75 90 Q 75 95 70 100" fill="#00f5ff" opacity="0.8"/>
    <path d="M 130 100 Q 135 90 130 80 Q 125 85 125 90 Q 125 95 130 100" fill="#00f5ff" opacity="0.8"/>
  </g>
  
  <!-- Third eye -->
  <g filter="url(#glow)">
    <ellipse cx="100" cy="90" rx="8" ry="12" fill="none" stroke="#8a2be2" stroke-width="2"/>
    <circle cx="100" cy="90" r="4" fill="#FFD700"/>
    <circle cx="100" cy="90" r="2" fill="#fff"/>
  </g>
  
  <!-- Mystical stars -->
  <g opacity="0.7">
    <path d="M 40 50 L 42 55 L 47 55 L 43 58 L 45 63 L 40 60 L 35 63 L 37 58 L 33 55 L 38 55 Z" fill="#FFD700"/>
    <path d="M 160 50 L 162 55 L 167 55 L 163 58 L 165 63 L 160 60 L 155 63 L 157 58 L 153 55 L 158 55 Z" fill="#00f5ff"/>
    <path d="M 50 150 L 52 155 L 57 155 L 53 158 L 55 163 L 50 160 L 45 163 L 47 158 L 43 155 L 48 155 Z" fill="#8a2be2"/>
    <path d="M 150 150 L 152 155 L 157 155 L 153 158 L 155 163 L 150 160 L 145 163 L 147 158 L 143 155 L 148 155 Z" fill="#FFD700"/>
  </g>
  
  <!-- Cosmic dots -->
  <circle cx="60" cy="100" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="140" cy="100" r="2" fill="#00f5ff" opacity="0.6"/>
  <circle cx="100" cy="50" r="2" fill="#8a2be2" opacity="0.6"/>
  <circle cx="100" cy="150" r="2" fill="#FFD700" opacity="0.6"/>
</svg>
