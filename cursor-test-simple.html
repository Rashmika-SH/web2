<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cursor Test</title>
    <style>
        body { 
            margin: 0; 
            padding: 50px; 
            background: #000; 
            color: #fff; 
            font-family: Arial;
            min-height: 100vh;
        }
        h1 { color: #FFD700; }
    </style>
</head>
<body>
    <h1>CURSOR TRAIL TEST</h1>
    <p>Move your mouse around this page!</p>
    <p>You should see GOLDEN YELLOW DOTS following your cursor.</p>
    <p>Click anywhere to create a burst!</p>
    
    <script>
        console.log('🎨 STARTING...');
        
        const canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:999999;';
        document.body.appendChild(canvas);
        
        const ctx = canvas.getContext('2d');
        const particles = [];
        
        console.log('✅ Canvas created');
        
        function Particle(x, y) {
            this.x = x;
            this.y = y;
            this.size = 5;
            this.speedX = (Math.random() - 0.5) * 2;
            this.speedY = -Math.random() * 2;
            this.life = 1;
        }
        
        Particle.prototype.update = function() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= 0.02;
        };
        
        Particle.prototype.draw = function() {
            ctx.fillStyle = 'rgba(255, 215, 0, ' + this.life + ')';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        };
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
        console.log('🎬 Animation running');
        
        document.addEventListener('mousemove', function(e) {
            particles.push(new Particle(e.clientX, e.clientY));
            console.log('🖱️ Mouse at', e.clientX, e.clientY, '- Particles:', particles.length);
        });
        
        document.addEventListener('click', function(e) {
            console.log('💥 CLICK!');
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(e.clientX + (Math.random() - 0.5) * 30, e.clientY + (Math.random() - 0.5) * 30));
            }
        });
        
        console.log('✨ READY! Move your mouse!');
    </script>
</body>
</html>
