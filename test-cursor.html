<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Trail Test</title>
    <style>
        body {
            margin: 0;
            padding: 50px;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }
        h1 {
            color: #FFD700;
        }
    </style>
</head>
<body>
    <h1>Cursor Trail Test</h1>
    <p>Move your mouse around to see the golden cursor trail!</p>
    <p>Click anywhere to create a burst effect!</p>
    
    <script>
        // ===== CURSOR TRAIL ANIMATION =====
        (function() {
            'use strict';
            
            console.log('🎨 Initializing cursor trail...');
            
            // Create canvas
            const canvas = document.createElement('canvas');
            canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            
            // Particle class
            function Particle(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 2;
                this.life = 1;
            }
            
            Particle.prototype.update = function() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
                if (this.life < 0) this.life = 0;
            };
            
            Particle.prototype.draw = function() {
                ctx.fillStyle = 'rgba(255, 215, 0, ' + this.life + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow effect
                ctx.fillStyle = 'rgba(255, 215, 0, ' + (this.life * 0.5) + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
            };
            
            // Animation loop
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    
                    if (particles[i].life <= 0) {
                        particles.splice(i, 1);
                    }
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            // Mouse move handler
            let lastTime = 0;
            document.addEventListener('mousemove', function(e) {
                const now = Date.now();
                if (now - lastTime > 20) {
                    particles.push(new Particle(e.clientX, e.clientY));
                    particles.push(new Particle(e.clientX + Math.random() * 10 - 5, e.clientY + Math.random() * 10 - 5));
                    lastTime = now;
                    console.log('Particle created at', e.clientX, e.clientY);
                }
            });
            
            // Click handler
            document.addEventListener('click', function(e) {
                console.log('Click burst!');
                for (let i = 0; i < 15; i++) {
                    const angle = (Math.PI * 2 * i) / 15;
                    const x = e.clientX + Math.cos(angle) * 20;
                    const y = e.clientY + Math.sin(angle) * 20;
                    particles.push(new Particle(x, y));
                }
            });
            
            // Resize handler
            window.addEventListener('resize', function() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
            
            console.log('✨ Cursor trail active! Canvas size:', canvas.width, 'x', canvas.height);
        })();
    </script>
</body>
</html>
